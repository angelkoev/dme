<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Register — DME</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<h1>Register</h1>
<form th:action="@{/register}" th:object="${registerRequest}" method="post">
    <div>
        <label for="username">Username</label>
        <input id="username" type="text" name="username" required="required"/>
        <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
    </div>
    <div>
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required="required"/>
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
    </div>
    <div>
        <label for="password">Password (at least 8 characters)</label>
        <input id="password" type="password" name="password" required="required"/>
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
    </div>
    <button type="submit">Register</button>
</form>
<p th:if="${registrationError}" th:text="${registrationError}" class="alert alert-error"></p>
<p><a th:href="@{/login}">Already have an account? Log in</a></p>
</body>
</html>
