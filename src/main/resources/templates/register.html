<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Регистрация — DME</title>
</head>
<body>
<h1>Регистрация</h1>
<form th:action="@{/register}" th:object="${registerRequest}" method="post">
    <div>
        <label for="username">Потребителско име</label>
        <input id="username" type="text" name="username" required="required"/>
        <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
    </div>
    <div>
        <label for="email">Имейл</label>
        <input id="email" type="email" name="email" required="required"/>
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
    </div>
    <div>
        <label for="password">Парола (поне 8 символа)</label>
        <input id="password" type="password" name="password" required="required"/>
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
    </div>
    <button type="submit">Регистрация</button>
</form>
<p th:if="${registrationError}" th:text="${registrationError}"></p>
<p><a th:href="@{/login}">Вече имаш акаунт? Влез</a></p>
</body>
</html>
