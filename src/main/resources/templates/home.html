<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>DME — Персонализирани тренировки</title>
</head>
<body>
<h1>DME</h1>
<nav>
    <a th:href="@{/exercises}">Упражнения</a>
    <span th:if="${username}"> | <a th:href="@{/profile}">Моят профил</a></span>
    <span th:if="${username}"> | <a th:href="@{/dashboard}">Моето табло</a></span>
    <span th:if="${username}"> | <a th:href="@{/progress}">Моят прогрес</a></span>
</nav>
<div th:if="${username}">
    <p>Влязъл си като <strong th:text="${username}"></strong>.</p>
    <form th:action="@{/logout}" method="post">
        <button type="submit">Изход</button>
    </form>
</div>
<div th:unless="${username}">
    <p><a th:href="@{/login}">Вход</a></p>
</div>
</body>
</html>
