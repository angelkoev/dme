<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>DME — Personalized Workouts</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<h1>DME</h1>
<nav>
    <a th:href="@{/help}">Help</a> |
    <a th:href="@{/exercises}">Exercises</a>
    <span th:if="${username}"> | <a th:href="@{/profile}">My Profile</a></span>
    <span th:if="${username}"> | <a th:href="@{/dashboard}">My Dashboard</a></span>
    <span th:if="${username}"> | <a th:href="@{/progress}">My Progress</a></span>
    <span th:if="${username}"> | <a th:href="@{/account/password}">Change Password</a></span>
    <span th:if="${isAdmin}"> | <a th:href="@{/admin/exercises}">Manage Exercises (Admin)</a></span>
</nav>
<div th:if="${username}">
    <p>Logged in as <strong th:text="${username}"></strong>.</p>
    <form th:action="@{/logout}" method="post">
        <button type="submit">Log out</button>
    </form>
</div>
<div th:unless="${username}">
    <p><a th:href="@{/login}">Log in</a> | <a th:href="@{/register}">Register</a></p>
</div>
</body>
</html>
