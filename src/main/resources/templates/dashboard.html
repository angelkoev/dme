<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Моето табло — DME</title>
</head>
<body>
<p><a th:href="@{/}">← Начало</a></p>
<h1>Моето табло</h1>

<div th:if="${streak}">
    <p>Текуща поредица: <strong th:text="${streak.currentStreak}"></strong> дни
        (най-дълга: <span th:text="${streak.longestStreak}"></span>)</p>
</div>

<div th:if="${noPlan}">
    <p>Все още нямаш генериран план.</p>
</div>

<form th:action="@{/dashboard/generate}" method="post">
    <button type="submit">Генерирай нова тренировъчна програма</button>
</form>

<div th:if="${plan}">
    <h2>Активен план — <span th:text="${plan.goal}"></span></h2>
    <div th:each="workoutSession : ${plan.sessions}">
        <h3 th:text="${workoutSession.name}"></h3>
        <table border="1" cellpadding="6">
            <thead>
            <tr>
                <th>Упражнение</th>
                <th>Серии</th>
                <th>Повторения</th>
                <th>Почивка (сек)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="se : ${workoutSession.exercises}">
                <td th:text="${se.exercise.name}"></td>
                <td th:text="${se.sets}"></td>
                <td th:text="${se.repRangeMin} + '-' + ${se.repRangeMax}"></td>
                <td th:text="${se.restSeconds}"></td>
            </tr>
            </tbody>
        </table>
        <form th:action="@{'/dashboard/sessions/' + ${workoutSession.id} + '/complete'}" method="post">
            <input type="hidden" name="planId" th:value="${plan.id}"/>
            <label>Изпълнение %:
                <input type="number" name="completionPercentage" min="0" max="100" value="100"/>
            </label>
            <label>Оценка (1-5):
                <input type="number" name="rating" min="1" max="5"/>
            </label>
            <button type="submit">Маркирай като завършена</button>
        </form>
    </div>
</div>
</body>
</html>
