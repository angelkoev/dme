<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>My Dashboard — DME</title>
</head>
<body>
<p><a th:href="@{/}">← Home</a></p>
<h1>My Dashboard</h1>

<div th:if="${streak}">
    <p>Current streak: <strong th:text="${streak.currentStreak}"></strong> days
        (longest: <span th:text="${streak.longestStreak}"></span>)</p>
</div>

<div th:if="${noPlan}">
    <p>You don't have a generated plan yet.</p>
</div>

<form th:action="@{/dashboard/generate}" method="post">
    <button type="submit">Generate a new workout plan</button>
</form>

<div th:if="${plan}">
    <h2>Active Plan — <span th:text="${plan.goal}"></span></h2>
    <div th:each="workoutSession : ${plan.sessions}">
        <h3 th:text="${workoutSession.name}"></h3>
        <table border="1" cellpadding="6">
            <thead>
            <tr>
                <th>Exercise</th>
                <th>Sets</th>
                <th>Reps</th>
                <th>Rest (sec)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="se : ${workoutSession.exercises}">
                <td th:text="${se.exercise.name}"></td>
                <td th:text="${se.sets}"></td>
                <td th:text="${se.repRangeMin} + '-' + ${se.repRangeMax}"></td>
                <td th:text="${se.restSeconds}"></td>
            </tr>
            </tbody>
        </table>
        <form th:action="@{'/dashboard/sessions/' + ${workoutSession.id} + '/complete'}" method="post">
            <input type="hidden" name="planId" th:value="${plan.id}"/>
            <label>Completion %:
                <input type="number" name="completionPercentage" min="0" max="100" value="100"/>
            </label>
            <label>Rating (1-5):
                <input type="number" name="rating" min="1" max="5"/>
            </label>
            <button type="submit">Mark as completed</button>
        </form>
    </div>
</div>
</body>
</html>
