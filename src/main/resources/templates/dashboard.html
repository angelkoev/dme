<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Dashboard — DME</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<p><a th:href="@{/}">← Home</a></p>
<h1>My Dashboard</h1>

<div th:if="${streak}" class="card">
    <p>Current streak: <strong th:text="${streak.currentStreak}"></strong> days
        (longest: <span th:text="${streak.longestStreak}"></span>)</p>
</div>

<p th:if="${noPlan}" class="alert alert-info">You don't have a generated plan yet.</p>

<p th:if="${generateError}" class="alert alert-error">
    <span th:text="${generateError}"></span> —
    <a th:href="@{/profile}">fill in your profile</a> first if you haven't yet.
</p>

<p th:if="${completeError}" class="alert alert-error" th:text="${completeError}"></p>

<form th:action="@{/dashboard/generate}" method="post">
    <label for="goalOverride">Goal for this plan:</label>
    <select id="goalOverride" name="goalOverride">
        <option value="">Use my profile's goal</option>
        <option th:each="goal : ${trainingGoals}" th:value="${goal}" th:text="${goal}"></option>
    </select>
    <button type="submit">Generate a new workout plan</button>
</form>

<div th:if="${plan}">
    <h2>Active Plan — <span th:text="${plan.goal}"></span></h2>
    <div th:each="workoutSession : ${plan.sessions}" class="card">
        <h3 th:text="${workoutSession.name}"></h3>
        <table>
            <thead>
            <tr>
                <th>Exercise</th>
                <th>Sets</th>
                <th>Reps</th>
                <th>Rest (sec)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="se : ${workoutSession.exercises}">
                <td th:text="${se.exercise.name}"></td>
                <td th:text="${se.sets}"></td>
                <td th:text="${se.repRangeMin} + '-' + ${se.repRangeMax}"></td>
                <td th:text="${se.restSeconds}"></td>
            </tr>
            </tbody>
        </table>
        <form th:action="@{'/dashboard/sessions/' + ${workoutSession.id} + '/complete'}" method="post">
            <input type="hidden" name="planId" th:value="${plan.id}"/>
            <label>Completion %:
                <input type="number" name="completionPercentage" min="0" max="100" value="100"/>
            </label>
            <label>Rating (1-5):
                <input type="number" name="rating" min="1" max="5"/>
            </label>
            <button type="submit">Mark as completed</button>
        </form>
    </div>
</div>
</body>
</html>
