<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Change Password — DME</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<p><a th:href="@{/}">← Home</a></p>
<h1>Change Password</h1>

<p th:if="${passwordChanged}" class="alert alert-success">Password changed.</p>
<p th:if="${passwordError}" th:text="${passwordError}" class="alert alert-error"></p>

<form th:action="@{/account/password}" th:object="${changePasswordRequest}" method="post">
    <div>
        <label for="currentPassword">Current password</label>
        <input id="currentPassword" type="password" name="currentPassword" required="required"/>
        <p th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></p>
    </div>
    <div>
        <label for="newPassword">New password (at least 8 characters)</label>
        <input id="newPassword" type="password" name="newPassword" required="required"/>
        <p th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>
    </div>
    <button type="submit">Change password</button>
</form>
</body>
</html>
