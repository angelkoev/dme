<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>My Progress — DME</title>
</head>
<body>
<p><a th:href="@{/}">← Home</a></p>
<h1>My Progress</h1>

<div th:if="${streak}">
    <p>Current streak: <strong th:text="${streak.currentStreak}"></strong> days
        (longest: <span th:text="${streak.longestStreak}"></span>)</p>
</div>

<h2>Personal Records</h2>
<table border="1" cellpadding="6" th:if="${not #lists.isEmpty(personalRecords)}">
    <thead>
    <tr>
        <th>Exercise</th>
        <th>Metric</th>
        <th>Value</th>
        <th>Achieved On</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="pr : ${personalRecords}">
        <td th:text="${exerciseNames.get(pr.exerciseId)}"></td>
        <td th:text="${pr.metricType}"></td>
        <td th:text="${pr.value}"></td>
        <td th:text="${pr.achievedAt}"></td>
    </tr>
    </tbody>
</table>
<p th:if="${#lists.isEmpty(personalRecords)}">No personal records yet.</p>

<h2>Workout History</h2>
<table border="1" cellpadding="6" th:if="${not #lists.isEmpty(workoutLogs)}">
    <thead>
    <tr>
        <th>Date</th>
        <th>Completion %</th>
        <th>Rating</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="log : ${workoutLogs}">
        <td th:text="${log.performedAt}"></td>
        <td th:text="${log.completionPercentage}"></td>
        <td th:text="${log.rating}"></td>
    </tr>
    </tbody>
</table>
<p th:if="${#lists.isEmpty(workoutLogs)}">No completed workouts yet.</p>
</body>
</html>
