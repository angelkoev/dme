services:
  mysql:
    image: mysql:8.4
    container_name: dme-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dme
      MYSQL_USER: dme
      MYSQL_PASSWORD: dme
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dme-mysql-data:/var/lib/mysql

volumes:
  dme-mysql-data:
